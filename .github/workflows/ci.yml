name: MLProject CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Konfigurasi MLflow dan DagsHub
    env:
      MLFLOW_TRACKING_URI: https://dagshub.com/dhaffazr/Eksperimen_SML_Model.mlflow
      MLFLOW_TRACKING_USERNAME: dhaffazr
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install MLflow & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub pandas scikit-learn

      - name: Run MLProject (Training Model)
        run: |
          cd MLProject
          # Menjalankan project MLflow
          mlflow run . --env-manager=local

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: dhaffazik
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image via MLflow
        run: |
          cd MLProject
          # MLflow akan otomatis membuat docker image dari model yang baru saja dilatih
          mlflow models build-docker -m model_dir -n dhaffazik/shoppers-model:latest
          
      - name: Push Docker Image to Docker Hub
        run: |
          docker push dhaffazik/shoppers-model:latest